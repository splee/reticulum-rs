# nextest configuration
#
# Integration tests use OS ephemeral port allocation (bind to port 0) and
# ChildGuard RAII wrappers for panic-safe process cleanup, so they can
# safely run in parallel across nextest subprocesses.

# Integration tests that spawn Python/Rust processes are CPU-heavy.
# Limit concurrency to avoid timeouts from resource contention.
[test-groups.process-heavy]
max-threads = 4

[[profile.default.overrides]]
filter = 'test(~tests::)'
test-group = "process-heavy"
