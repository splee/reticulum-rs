# Python Reticulum Hub Configuration
# TCP Server for integration testing

[reticulum]
  enable_transport = Yes
  share_instance = Yes
  shared_instance_port = 37428
  instance_control_port = 37429
  panic_on_interface_error = No

[logging]
  loglevel = 5

[interfaces]

  [[TCP Server Interface]]
    type = TCPServerInterface
    enabled = True
    listen_ip = 0.0.0.0
    listen_port = 14242
