# Rust Endpoint Node Configuration
# Connects only to rust-relay (cannot directly reach python-hub)

[reticulum]
enable_transport = false
share_instance = true
shared_instance_port = 37429
panic_on_interface_error = false

[logging]
loglevel = 5

[interfaces]
  # Connect to relay node only
  [[TCP Client to Relay]]
    type = TCPClientInterface
    enabled = true
    target_host = rust-relay
    target_port = 14243

  # Local server for testing
  [[TCP Server]]
    type = TCPServerInterface
    enabled = true
    listen_ip = 0.0.0.0
    listen_port = 14244
