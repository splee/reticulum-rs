# Rust Relay Node Configuration
# Acts as a relay between python-hub and rust-endpoint

[reticulum]
enable_transport = true
share_instance = true
shared_instance_port = 37428
panic_on_interface_error = false

[logging]
loglevel = 5

[interfaces]
  # Connect to Python hub
  [[TCP Client to Hub]]
    type = TCPClientInterface
    interface_enabled = true
    target_host = python-hub
    target_port = 4242

  # Server for endpoint to connect
  [[TCP Server for Endpoint]]
    type = TCPServerInterface
    interface_enabled = true
    listen_ip = 0.0.0.0
    listen_port = 4243
