# Rust Reticulum Node Configuration
# TCP Client connecting to Python hub for integration testing

[reticulum]
enable_transport = true
share_instance = true
shared_instance_port = 37428
panic_on_interface_error = false

[logging]
loglevel = 5

[interfaces]

  [[TCP Client to Python Hub]]
    type = TCPClientInterface
    enabled = true
    target_host = python-hub
    target_port = 14242

  [[TCP Server Interface]]
    type = TCPServerInterface
    enabled = true
    listen_ip = 0.0.0.0
    listen_port = 14243
