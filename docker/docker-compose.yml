# Docker Compose for Python-Rust Reticulum Interoperability Testing
#
# Usage:
#   docker compose -f docker/docker-compose.yml up --build
#
# This creates:
#   - python-hub: Python Reticulum daemon with TCP server on port 4242
#   - rust-node: Rust Reticulum daemon connecting to python-hub

services:
  python-hub:
    build:
      context: ../..
      dockerfile: reticulum-rust/docker/Dockerfile.python
    container_name: reticulum-python-hub
    hostname: python-hub
    networks:
      - reticulum-net
    ports:
      - "14242:14242"
    volumes:
      - python-data:/root/.reticulum
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.connect(('127.0.0.1', 14242)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  rust-node:
    build:
      context: ..
      dockerfile: docker/Dockerfile.rust
    container_name: reticulum-rust-node
    hostname: rust-node
    networks:
      - reticulum-net
    ports:
      - "14243:14243"
    volumes:
      - rust-data:/root/.reticulum
    depends_on:
      python-hub:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 14243 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

networks:
  reticulum-net:
    driver: bridge

volumes:
  python-data:
  rust-data:
